<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
  </head>
  <body>
    <!-- HEADER -->
    <header>
      <a class="logo" href="index.html">
        <div class="logo-badge">SU</div>
        <div class="logo-text">
          <b>Silicon University</b>
          <small>Complaint Portal</small>
        </div>
      </a>
      <nav>
        <a href="index.html">Dashboard</a>
        <a href="add.html">New Complaint</a>
      </nav>
    </header>
    <hr />

    <!-- MAIN -->
    <main>
      <div class="container">
        <!-- page title row -->
        <div class="page-header">
          <div>
            <h1>All complaints</h1>
            <p>" Every complaint submited by Silicon University & staff. "</p>
          </div>

          <!-- complaints table -->
          <div class="card">
            <table>
              <thead>
                <tr>
                  <th>#</th>
                  <th>Name</th>
                  <th>Category</th>
                  <th>Title</th>
                  <th>Satuts</th>
                  <th>Date</th>
                </tr>
              </thead>

              <tbody id="complaintsBody">
                <tr>
                  <td></td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
    <hr />

    <!-- FOOTER -->
    <footer>
      <h4>2026 Silicon University | m1 complaint portal</h4>
      <p><em>&copy;All rights reserved</em></p>
    </footer>
  </body>
</html>
